<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF9933">
    <title>🚩 भव्य मंदिर APP - ऑफलाइन</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #FFF8F0, #FFE0B2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(255,153,51,0.2);
            border: 2px solid #FF9933;
        }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #E65100; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .status { 
            display: inline-block;
            background: #FFEBEE;
            color: #C62828;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: #FF9933;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="icon">🚩</div>
        <h1>आप ऑफलाइन हैं!</h1>
        <div class="status">📵 इंटरनेट कनेक्शन नहीं है</div>
        <p>कृपया अपना इंटरनेट कनेक्शन जांचें और पुनः प्रयास करें।</p>
        <button class="btn" onclick="location.reload()">🔄 पुनः प्रयास करें</button>
    </div>
    
    <script>
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
